<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
       <!-- google-font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="bg-[#E4E4E7]">
    <header class="navbar flex-col gap-2 bg-base-100 shadow-sm sm:flex-row justify-between ">
        <div class="left-section flex gap-2 items-center">
            <img class="w-[10%]" src="./assets/github-logo.png" alt="">
            <h1 class="font-bold text-[20px] sm:text-[24px]">GitHub Issues Tracker</h1>
        </div>
        <div class="right-section flex justify-center gap-2">
            <label class="input">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
                >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
                </g>
            </svg>
            <input id="input-search" type="search" required placeholder="Search issues..." />
            </label>
           <button id="btn-search" class="btn btn-primary">+ New Issue</button>
        </div>
    </header>
    <main class="max-w-[1110px] m-auto pt-[30px]">
<section class="tab-section">
    <div id="tab-container" class="navbar bg-base-100 shadow-sm rounded space-x-2">
        <a id="btn-all" onclick="loadAllData()" class="btn btn-primary text-md tab-btn">All</a>
        <a id="btn-open" onclick="loadOpenData()" class="btn text-md tab-btn">Open</a>
        <a id="btn-closed" onclick="loadClosedData()" class="btn text-md tab-btn">Closed</a>
    </div>
</section>
        <section class="container pt-[16px]">
            <div class="card-counter bg-base-100 shadow-sm rounded flex flex-col items-center gap-3 sm:flex-row justify-between p-4">
                <div class="card-counter-left flex items-center gap-3">
                    <img src="./assets/Aperture.png" alt="">
                    <div class="left-text-content">
                        <h2 class="font-bold"><span id="open-count">0</span> Issues</h2>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <div class="card-counter-right flex items-center gap-3">
                    <div class="badge badge-success  rounded-full p-3"></div>
                    <p> Open</p>
                    <div class="badge bg-purple-600 rounded-full p-3"></div>
                    <p>Closed</p>
                </div>
            </div>
        </section>
        <section class="card-section bg-[#FBFBFB] p-4">
            <div id="all-cards-container" class="all-cards-container grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                <!-- dynamic code  -->
            </div>
            <div id="loadingSpinner" class=" hidden flex justify-center items-center">
                <span class="loading loading-spinner loading-xl"></span>
            </div>
        </section>
        
        
            <section class="card-section bg-[#FBFBFB] p-4">
            <div id="open-cards-container" class="open-cards-container grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                <!-- dynamic code  -->
            </div>
            <div id="loadingSpinner" class=" hidden flex justify-center items-center">
                <span class="loading loading-spinner loading-xl"></span>
            </div>
        </section>
    </main>

    <dialog id="issue_modal" class="modal">
        <div class="modal-box">
            <h3 id="modal-title" class="font-bold text-lg"></h3>
            <div id="modal-body" class="py-4 space-y-3">
                <!-- dynamic code  -->
            </div>
            <div class="modal-action">
            <form method="dialog">
                <button class="btn btn-primary">Close</button>
            </form>
            </div>
        </div>
    </dialog>

    <script src="./home.js"></script>
</body>
</html>
